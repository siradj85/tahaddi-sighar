name: بناء تطبيق الأندرويد

on:
  push:
    branches: [ main, master, opencode-v6 ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: تحميل الكود
        uses: actions/checkout@v4

      - name: تهيئة Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: تهيئة Android SDK
        uses: android-actions/setup-android@v3

      - name: إنشاء Gradle wrapper
        run: gradle wrapper --gradle-version 8.11.1 --distribution-type bin

      - name: تجهيز مفتاح التوقيع
        id: keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "::notice::استخدام مفتاح التوقيع المحفوظ في الأسرار (Secrets)."
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/upload.jks"
            echo "STORE_PW=${{ secrets.KEYSTORE_PASSWORD }}" >> "$GITHUB_ENV"
            echo "KEY_PW=${{ secrets.KEY_PASSWORD }}" >> "$GITHUB_ENV"
            echo "ALIAS=${{ secrets.KEY_ALIAS }}" >> "$GITHUB_ENV"
            echo "generated=false" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::لا يوجد مفتاح محفوظ — سيتم إنشاء مفتاح جديد. حمّله من المخرجات واحتفظ به!"
            PW="tahaddi-$(echo $GITHUB_SHA | cut -c1-8)"
            keytool -genkeypair -v \
              -keystore "$RUNNER_TEMP/upload.jks" \
              -alias upload -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass "$PW" -keypass "$PW" \
              -dname "CN=Tahaddi Sighar, O=Said Charoun, C=DZ"
            echo "STORE_PW=$PW" >> "$GITHUB_ENV"
            echo "KEY_PW=$PW" >> "$GITHUB_ENV"
            echo "ALIAS=upload" >> "$GITHUB_ENV"
            echo "GENERATED_PW=$PW" >> "$GITHUB_ENV"
            echo "generated=true" >> "$GITHUB_OUTPUT"
          fi

      - name: بناء التطبيق (AAB + APK موقّع)
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/upload.jks
          KEYSTORE_PASSWORD: ${{ env.STORE_PW }}
          KEY_ALIAS: ${{ env.ALIAS }}
          KEY_PASSWORD: ${{ env.KEY_PW }}
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease bundleRelease --no-daemon --stacktrace

      - name: رفع ملف AAB (للرفع على Google Play)
        uses: actions/upload-artifact@v4
        with:
          name: aab-للنشر-على-جوجل-بلاي
          path: app/build/outputs/bundle/release/*.aab

      - name: رفع APK الموقّع (للتثبيت على الهاتف — يقبل التحديثات)
        uses: actions/upload-artifact@v4
        with:
          name: apk-موقّع-للتثبيت
          path: app/build/outputs/apk/release/*.apk

      - name: رفع مفتاح التوقيع الجديد (احتفظ به جيداً!)
        if: steps.keystore.outputs.generated == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: مفتاح-التوقيع-احتفظ-به
          path: ${{ runner.temp }}/upload.jks

      - name: تعليمات المفتاح الجديد
        if: steps.keystore.outputs.generated == 'true'
        run: |
          echo "::notice::تم إنشاء مفتاح توقيع جديد. كلمة المرور: ${GENERATED_PW}"
          echo "::notice::حمّل المفتاح من قسم Artifacts باسم (مفتاح-التوقيع-احتفظ-به) واحتفظ به في مكان آمن."
